[window.padding]
x = 10
y = 10

[terminal.shell]
program = "/bin/bash"
args = ["-l", "-c", "set -o ignoreeof; exec bash"]

[window]
option_as_alt = "OnlyLeft"
startup_mode = "Maximized"

[[mouse.bindings]]
mouse = "Right"
action = "Paste"

[selection]
save_to_clipboard = true

[scrolling]
history = 10000

[font.normal]
family = "JetBrainsMono Nerd Font"

[font]
size = 19

# Gas City — warm-dark palette. Source of truth for ANSI colors used by
# claude code (dark-ansi), codex TUI, btop (TTY theme), and oh-my-posh.
[colors.primary]
background = "#1e150e"
foreground = "#e8d4a8"
dim_foreground = "#a89074"
bright_foreground = "#fce8c8"

[colors.cursor]
text = "#1e150e"
cursor = "#e0a060"

[colors.vi_mode_cursor]
text = "#1e150e"
cursor = "#7fa9a9"

[colors.search.matches]
foreground = "#1e150e"
background = "#a8804a"

[colors.search.focused_match]
foreground = "#1e150e"
background = "#e0a060"

[colors.footer_bar]
foreground = "#e8d4a8"
background = "#50382a"

[colors.hints.start]
foreground = "#1e150e"
background = "#e08652"

[colors.hints.end]
foreground = "#e8d4a8"
background = "#50382a"

[colors.selection]
text = "#e8d4a8"
background = "#4a3520"

[colors.normal]
black = "#3a2a1c"
red = "#cc6e3a"
green = "#8a9a5b"
yellow = "#e0a060"
blue = "#5b85a8"
magenta = "#c4806c"
cyan = "#7fa9a9"
white = "#e8d4a8"

[colors.bright]
black = "#50382a"
red = "#e08652"
green = "#a8b878"
yellow = "#f0b870"
blue = "#7ba5c8"
magenta = "#d8a090"
cyan = "#9fc4c4"
white = "#fce8c8"

[[colors.indexed_colors]]
index = 16
color = "#e08652"

[[colors.indexed_colors]]
index = 17
color = "#c4806c"
