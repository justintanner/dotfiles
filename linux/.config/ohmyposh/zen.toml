schema = 'https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json'
version = 3
final_space = true

[palette]
# Gas City — warm-dark palette (see linux/.alacritty.toml for the source of truth).
# Catppuccin key names kept so segment refs (p:pink, p:lavender, p:closer) resolve.
rosewater = '#e8d4a8'
flamingo = '#d8a090'
pink = '#e0a060'
mauve = '#c4806c'
red = '#cc6e3a'
maroon = '#e08652'
peach = '#e08652'
yellow = '#e0a060'
green = '#8a9a5b'
teal = '#7fa9a9'
sky = '#7ba5c8'
sapphire = '#5b85a8'
blue = '#5b85a8'
lavender = '#7fa9a9'
text = '#e8d4a8'
subtext1 = '#d4c094'
subtext0 = '#a89074'
overlay2 = '#8a7460'
overlay1 = '#6e5a48'
overlay0 = '#5a4a3a'
surface2 = '#a89074'
surface1 = '#3d2e20'
surface0 = '#2a1f15'
base = '#1e150e'
mantle = '#17100a'
crust = '#0f0a06'
os = 'p:surface2'
closer = 'p:surface2'

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

# Current Path
[[blocks.segments]]
type = 'path'
style = 'plain'
foreground = 'p:pink'
template = '{{ .Path }} '
[blocks.segments.properties]
folder_icon = '..'
home_icon = '~'
style = 'agnoster_short'

# Git Branch
[[blocks.segments]]
type = 'git'
style = 'plain'
foreground = 'p:lavender'
template = 'git:{{ .HEAD }} '
[blocks.segments.properties]
branch_icon = ''
fetch_status = false
fetch_upstream_icon = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
type = 'text'
style = 'plain'
foreground = 'p:closer'
template = '>'
