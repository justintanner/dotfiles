# ── Quality-of-life defaults ──────────────────────────────────────────

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Alt+arrow to switch panes (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Gas City theme ────────────────────────────────────────────────────
# Matches the warm-dark palette in linux/.alacritty.toml.
#   bg            #1e150e   foreground   #e8d4a8
#   surface       #50382a   dim          #a89074
#   accent (org)  #e08652   accent (amb) #e0a060
#   sand          #a8804a   sage         #8a9a5b

set -g status-position bottom
set -g status-justify  left
set -g status-interval 5

set -g status-style       "bg=#50382a,fg=#e8d4a8"
set -g status-left-style  "bg=#50382a,fg=#e0a060,bold"
set -g status-right-style "bg=#50382a,fg=#a89074"

set -g status-left  " #[fg=#e0a060,bold]#S #[fg=#a89074]│ "
set -g status-right "#[fg=#a89074]#(whoami)@#h  #[fg=#e8d4a8]%H:%M #[fg=#a89074]· #[fg=#e8d4a8]%d-%b "

set -g status-left-length  40
set -g status-right-length 80

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-style          "bg=#50382a,fg=#a89074"
setw -g window-status-current-style  "bg=#e08652,fg=#1e150e,bold"
setw -g window-status-activity-style "bg=#50382a,fg=#e0a060,bold"
setw -g window-status-bell-style     "bg=#cc6e3a,fg=#1e150e,bold"
setw -g window-status-separator      ""

set -g pane-border-style        "fg=#3a2a1c"
set -g pane-active-border-style "fg=#e08652"

set -g message-style         "bg=#a8804a,fg=#1e150e,bold"
set -g message-command-style "bg=#a8804a,fg=#1e150e,bold"

set -g mode-style "bg=#e0a060,fg=#1e150e,bold"

set -g clock-mode-colour "#e0a060"
set -g display-panes-active-colour "#e08652"
set -g display-panes-colour        "#a89074"
